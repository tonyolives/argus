# =============================================================================
# Argus — Application Configuration
# Default section: no database required (DataSource/JPA/Flyway excluded).
# Activate the "dev" profile (SPRING_PROFILES_ACTIVE=dev) when Docker DB is up.
# =============================================================================
server:
  port: 8080

spring:
  application:
    name: argus

  # Exclude DB-dependent autoconfiguration until the database is provisioned
  # (ARG-003 / ARG-004). Remove these exclusions once Flyway migrations land.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.argus: DEBUG

---
# =============================================================================
# dev profile — requires docker-compose up -d db
# =============================================================================
spring:
  config:
    activate:
      on-profile: dev

  # Re-enable autoconfiguration excluded in the default section
  autoconfigure:
    exclude: []

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:argus}
    username: ${POSTGRES_USER:argus_user}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.argus: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

---
# =============================================================================
# prod profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod

  # Re-enable autoconfiguration excluded in the default section
  autoconfigure:
    exclude: []

  datasource:
    url: ${DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.argus: INFO
    root: WARN
