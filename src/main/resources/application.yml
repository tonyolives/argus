# =============================================================================
# Argus — Shared Application Configuration
# Profile-specific settings live in application-dev.yml and application-prod.yml.
# Keep DB-dependent autoconfiguration off by default so docs work, frontend work,
# and non-DB backend tests can still boot cleanly without a database.
# =============================================================================
server:
  port: 8080

spring:
  application:
    name: argus

  # Leave DB-dependent autoconfiguration off by default so documentation work,
  # frontend work, and non-DB backend tests can still boot cleanly.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
